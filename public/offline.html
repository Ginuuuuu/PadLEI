<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#162033" />
    <title>PadLEI - Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(14, 165, 164, 0.16), transparent 34rem),
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 32rem),
          #f7fafc;
        color: #162033;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 24px 70px rgba(22, 32, 51, 0.12);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #536277;
        font-size: 15px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        padding: 0 18px;
        border-radius: 10px;
        background: #162033;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/padlei-icon-192.png" width="72" height="72" alt="PadLEI" />
      <h1>You are offline</h1>
      <p>Reconnect to the internet, then open PadLEI again to continue studying and taking mock tests.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
